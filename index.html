<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area 51 Food Park</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    background: radial-gradient(circle at top, #1a0033, #000);
    overflow-x: hidden;
}

/* STAR BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    animation: moveStars 60s linear infinite;
    z-index: -2;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px, -500px); }
}

/* UFO ANIMATION */
.ufo {
    position: fixed;
    width: 120px;
    animation: flyUFO linear infinite;
    z-index: -1;
}

.ufo1 { top: 10%; left: -150px; animation-duration: 25s; }
.ufo2 { top: 40%; left: -200px; animation-duration: 35s; }
.ufo3 { top: 70%; left: -180px; animation-duration: 30s; }

@keyframes flyUFO {
    from { transform: translateX(0); }
    to { transform: translateX(120vw); }
}

/* HEADINGS */
h1 {
    text-align: center;
    font-size: 3rem;
    color: #39ff14;
    text-shadow: 0 0 20px #39ff14, 0 0 40px #00ffff;
}

h2 {
    text-align: center;
    font-size: 2rem;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

/* SECTIONS */
.section {
    padding: 50px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: relative;
}

.container {
    max-width: 1000px;
    margin: auto;
}

/* IMAGES */
img {
    width: 100%;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 0 20px #00ffff;
}

/* EDIT BOX */
.edit-box {
    margin-top: 15px;
    padding: 15px;
    border: 2px dashed #39ff14;
    border-radius: 10px;
    background: rgba(0,0,0,0.5);
}

.edit-box input, .edit-box textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

/* FLOATING ICONS */
.icon {
    position: absolute;
    font-size: 30px;
    animation: float 6s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}

</style>
</head>

<body>

<!-- UFOs -->
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" class="ufo ufo1">
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" class="ufo ufo2">
<img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" class="ufo ufo3">

<h1>AREA 51 FOOD PARK</h1>

<div class="container">

<!-- VENDORS -->
<div class="section">
<h2>Vendors</h2>

<img src=".jpg">
<img src="YOUR_IMAGE_2.jpg">
<img src="YOUR_IMAGE_3.jpg">

<div class="edit-box">
<input placeholder="Event Time">
<textarea placeholder="Vendor details..."></textarea>
</div>
</div>

<!-- SPACE TO PARTY -->
<div class="section">
<h2>"Space" to Party</h2>

<!-- Party icons -->
<div class="icon" style="left:10%;">🎉</div>
<div class="icon" style="left:80%;">🎈</div>

<img src="YOUR_IMAGE_4.jpg">

<div class="edit-box">
<input placeholder="Time">
<textarea placeholder="Party details..."></textarea>
</div>
</div>

<!-- SOCCER -->
<div class="section">
<h2>Soccer</h2>

<div class="icon" style="left:20%;">⚽</div>
<div class="icon" style="left:70%;">⚽</div>

<div class="edit-box">
<input placeholder="Game times">
<textarea placeholder="Details..."></textarea>
</div>
</div>

<!-- VOLLEYBALL -->
<div class="section">
<h2>Volleyball</h2>

<div class="icon" style="left:25%;">🏐</div>
<div class="icon" style="left:75%;">🏐</div>

<div class="edit-box">
<input placeholder="Game times">
<textarea placeholder="Details..."></textarea>
</div>
</div>

<!-- EVENTS -->
<div class="section">
<h2>Events</h2>

<div class="icon" style="left:15%;">✨</div>
<div class="icon" style="left:85%;">🚀</div>

<div class="edit-box">
<input placeholder="Event time">
<textarea placeholder="Event details..."></textarea>
</div>
</div>

<!-- FOOD TRUCKS -->
<div class="section">
<h2>Food Trucks</h2>

<div class="icon" style="left:20%;">🍔</div>
<div class="icon" style="left:70%;">🌮</div>

<div class="edit-box">
<textarea placeholder="Food trucks list..."></textarea>
</div>
</div>

<!-- AFTER HOURS -->
<div class="section">
<h2>Area 51 After Hours</h2>

<div class="icon" style="left:30%;">🌙</div>
<div class="icon" style="left:80%;">🛸</div>

<div class="edit-box">
<input placeholder="Time">
<textarea placeholder="Details..."></textarea>
</div>
</div>

<!-- MUSIC -->
<div class="section">
<h2>Music Performers</h2>

<div class="icon" style="left:20%;">🎵</div>
<div class="icon" style="left:70%;">🎧</div>

<div class="edit-box">
<input placeholder="Performance time">
<textarea placeholder="Artist info..."></textarea>
</div>
</div>

</div>

</body>
</html>
